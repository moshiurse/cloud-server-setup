# GitHub Actions CI/CD Pipeline for React.js Application
# ======================================================
#
# This workflow builds and deploys a React.js (CRA / Vite) app to your VPS.
# The React app is built into static files and uploaded to the server,
# where Nginx serves them directly — no Node.js process needed in production.
#
# Setup Steps:
#   1. Copy this file to your React project:
#      .github/workflows/deploy.yml
#
#   2. Add these GitHub Secrets (Settings → Secrets → Actions):
#      - VPS_HOST        → Your VPS IP address (e.g., 123.45.67.89)
#      - VPS_USERNAME    → Your deploy user (e.g., deploy)
#      - VPS_SSH_KEY     → Private SSH key for the deploy user
#
#   3. Adjust the variables below:
#      - APP_DIR         → Path on VPS where build files are served
#      - BUILD_DIR       → Build output folder ("build" for CRA, "dist" for Vite)
#      - NODE_VERSION    → Node.js version to use
#
#   4. First-time server setup:
#      ssh deploy@YOUR_VPS_IP
#      sudo mkdir -p /var/www/apps/yourapp
#      sudo chown deploy:deploy /var/www/apps/yourapp
#      # Setup Nginx using nginx/nginx-reactjs.conf template
#
# ======================================================

name: Deploy React App

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  APP_DIR: /var/www/apps/yourapp       # Deployment path on VPS
  BUILD_DIR: build                      # "build" for CRA, "dist" for Vite
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          CI: true
          # Add your build-time environment variables here:
          # REACT_APP_API_URL: https://api.yourdomain.com
          # VITE_API_URL: https://api.yourdomain.com

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Starting React deployment..."

            # Create backup of current build
            if [ -d "${{ env.APP_DIR }}" ]; then
              cp -r ${{ env.APP_DIR }} ${{ env.APP_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi

            mkdir -p ${{ env.APP_DIR }}

      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "${{ env.BUILD_DIR }}/*"
          target: ${{ env.APP_DIR }}
          strip_components: 1

      - name: Post-deploy cleanup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Reload Nginx to clear any cache
            sudo systemctl reload nginx

            # Clean up old backups (keep last 3)
            ls -dt ${{ env.APP_DIR }}_backup_* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null

            echo "✅ React deployment completed!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
