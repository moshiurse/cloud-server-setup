# ============================================
# GitHub Actions: NestJS Deploy to VPS
# ============================================
# Triggers on push to main branch
# Runs tests → builds → deploys via SSH → restarts PM2
#
# Required GitHub Secrets:
#   VPS_HOST        - Your VPS IP address
#   VPS_USERNAME    - SSH username (e.g., deploy)
#   VPS_SSH_KEY     - Private SSH key content
#   VPS_APP_PATH    - App directory (e.g., /var/www/apps/nestjs-app)
#
# Optional Secrets:
#   VPS_PORT        - SSH port (default: 22)
#   SLACK_WEBHOOK   - Slack notification URL
#   DATABASE_URL    - Test database URL
# ============================================

name: Deploy NestJS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---- Job 1: Lint & Test ----
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      # PostgreSQL for integration tests (common with NestJS)
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # Redis for cache/queue tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Build application
        run: npm run build

  # ---- Job 2: Deploy to VPS ----
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "📁 Navigating to app directory..."
            cd ${{ secrets.VPS_APP_PATH }}

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            npm ci --production=false

            echo "🔨 Building NestJS app..."
            npm run build

            echo "🗃️ Running database migrations..."
            # Uncomment the one you use:
            # npx prisma migrate deploy        # Prisma
            # npm run typeorm migration:run     # TypeORM
            # npx knex migrate:latest           # Knex

            echo "🔄 Restarting PM2..."
            pm2 reload ecosystem.config.js --env production

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "⏳ Waiting for app to start..."
            sleep 5

            echo "🏥 Health check..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Deploy successful! Health check passed."
            else
              echo "⚠️ Health check returned $HTTP_STATUS — check logs with: pm2 logs"
              pm2 logs --lines 20 --nostream
              exit 1
            fi

      # ---- Optional: Slack notification ----
      - name: Notify Slack
        if: always() && secrets.SLACK_WEBHOOK
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
