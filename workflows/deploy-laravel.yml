# GitHub Actions CI/CD Pipeline for Laravel Application
# =====================================================
#
# This workflow deploys a Laravel app to your VPS.
# Includes: Composer install, migrations, cache clearing, queue restart, etc.
#
# Setup Steps:
#   1. Copy this file to your Laravel project:
#      .github/workflows/deploy.yml
#
#   2. Add these GitHub Secrets (Settings → Secrets → Actions):
#      - VPS_HOST        → Your VPS IP address (e.g., 123.45.67.89)
#      - VPS_USERNAME    → Your deploy user (e.g., deploy)
#      - VPS_SSH_KEY     → Private SSH key for the deploy user
#
#   3. Adjust the variables below:
#      - APP_DIR         → Path on VPS where your Laravel app lives
#      - PHP_VERSION     → PHP version to use
#
#   4. First-time server setup:
#      ssh deploy@YOUR_VPS_IP
#      cd /var/www/apps
#      git clone https://github.com/yourusername/yourrepo.git yourapp
#      cd yourapp
#      composer install --no-dev --optimize-autoloader
#      cp .env.example .env
#      php artisan key:generate
#      nano .env   # Configure DB, mail, cache, etc.
#      php artisan migrate
#      php artisan storage:link
#      sudo chown -R www-data:www-data storage bootstrap/cache
#      # Setup Nginx using nginx/nginx-php.conf template
#        (set root to: /var/www/apps/yourapp/public)
#      # Optional: Setup queue worker with Supervisor (see bottom of file)
#
# Nginx Note for Laravel:
#   Use the nginx/nginx-php.conf template with these changes:
#   - Set root to: /var/www/apps/yourapp/public
#   - The try_files directive already handles Laravel routing
#
# =====================================================

name: Deploy Laravel App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /var/www/apps/yourapp
  PHP_VERSION: '8.2'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      # Uncomment if your app uses Redis:
      # redis:
      #   image: redis:7
      #   ports:
      #     - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, xml, curl, zip, gd, bcmath, redis
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Laravel linter (Pint)
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test
          else
            echo "Laravel Pint not installed, skipping"
          fi

      - name: Run PHPStan / Larastan
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "PHPStan not installed, skipping"
          fi

      - name: Run tests
        run: php artisan test --parallel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: testpass
          # REDIS_HOST: 127.0.0.1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Starting Laravel deployment..."

            cd ${{ env.APP_DIR }}

            # Enable maintenance mode
            php artisan down --refresh=15

            # Pull latest code
            git pull origin main

            # Install Composer dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Run database migrations
            php artisan migrate --force

            # Clear and rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Clear old cache
            php artisan cache:clear

            # Restart queue workers (if using queues)
            php artisan queue:restart 2>/dev/null || true

            # Link storage (idempotent)
            php artisan storage:link 2>/dev/null || true

            # Set proper permissions
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            # Restart PHP-FPM to clear opcache
            sudo systemctl reload php8.2-fpm

            # Disable maintenance mode
            php artisan up

            echo "✅ Laravel deployment completed!"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Check PHP-FPM
            sudo systemctl is-active php8.2-fpm

            # Check Nginx
            sudo systemctl is-active nginx

            # HTTP health check
            curl -sf http://localhost/ > /dev/null && echo "✅ Site is responding" || echo "⚠️ Site not responding"

            # Check Laravel log for recent errors
            tail -5 ${{ env.APP_DIR }}/storage/logs/laravel.log 2>/dev/null | grep -i "error" && echo "⚠️ Recent errors in log" || echo "✅ No recent errors"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi

# =====================================================
# OPTIONAL: Supervisor config for Laravel Queue Workers
# =====================================================
# Create this file on your VPS at: /etc/supervisor/conf.d/yourapp-worker.conf
#
# [program:yourapp-worker]
# process_name=%(program_name)s_%(process_num)02d
# command=php /var/www/apps/yourapp/artisan queue:work --sleep=3 --tries=3 --max-time=3600
# autostart=true
# autorestart=true
# stopasgroup=true
# killasgroup=true
# user=www-data
# numprocs=2
# redirect_stderr=true
# stdout_logfile=/var/www/apps/yourapp/storage/logs/worker.log
# stopwaitsecs=3600
#
# Then run:
#   sudo supervisorctl reread
#   sudo supervisorctl update
#   sudo supervisorctl start yourapp-worker:*
#
# =====================================================
# OPTIONAL: Laravel Scheduler (Cron Job)
# =====================================================
# Add to crontab (sudo crontab -e -u www-data):
#   * * * * * cd /var/www/apps/yourapp && php artisan schedule:run >> /dev/null 2>&1
