# Nginx configuration for React.js application (Static SPA Build)
# ================================================================
#
# This configuration serves a React.js production build (static files).
# React apps are built into static HTML/CSS/JS files using "npm run build",
# and Nginx serves them directly — no Node.js process needed in production.
#
# Prerequisites:
#   - Build your React app locally or via CI/CD:
#       npm run build
#   - Upload the build output to the server
#
# Setup Steps:
#   1. Upload your build files to the server:
#      scp -r build/* deploy@YOUR_VPS_IP:/var/www/apps/yourapp/
#
#      Or clone and build on server:
#      cd /var/www/apps/yourapp
#      git clone https://github.com/yourusername/yourrepo.git .
#      npm install
#      npm run build
#
#   2. Copy this file:
#      sudo cp nginx-reactjs.conf /etc/nginx/sites-available/yourapp
#
#   3. Edit the file and replace:
#      - "yourdomain.com" with your actual domain
#      - "/var/www/apps/yourapp/build" with your build output path
#        (Vite uses "dist" instead of "build": /var/www/apps/yourapp/dist)
#
#   4. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/yourapp /etc/nginx/sites-enabled/
#
#   5. Test configuration:
#      sudo nginx -t
#
#   6. Reload Nginx:
#      sudo systemctl reload nginx
#
#   7. Setup SSL (after DNS is pointed):
#      sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Directory Structure:
#   /var/www/apps/yourapp/
#   ├── build/           ← CRA build output (document root)
#   │   ├── index.html
#   │   └── static/
#   │       ├── css/
#   │       ├── js/
#   │       └── media/
#   └── ...
#
#   OR for Vite:
#   /var/www/apps/yourapp/
#   ├── dist/            ← Vite build output (document root)
#   │   ├── index.html
#   │   └── assets/
#   └── ...
#
# If your React app uses an API backend:
#   See the "API proxy" section below to proxy API calls to your backend.
#
# ================================================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Document root - point to your React build output
    # CRA: /var/www/apps/yourapp/build
    # Vite: /var/www/apps/yourapp/dist
    root /var/www/apps/yourapp/build;
    index index.html;

    # Redirect HTTP to HTTPS (enable after SSL is setup)
    # return 301 https://$server_name$request_uri;

    # Handle React Router (SPA client-side routing)
    # All routes fall back to index.html so React Router can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (hashed filenames in CRA/Vite)
    # These files have unique hashes in their names, so they can be cached forever
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vite assets directory (if using Vite instead of CRA)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache other static files (images, fonts, etc.)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Don't cache index.html (so users always get the latest version)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Don't cache service worker (if using PWA)
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API proxy (if your React app calls a backend API on the same domain)
    # Uncomment and adjust the proxy_pass URL to your backend server
    # location /api/ {
    #     proxy_pass http://localhost:4000;    # Your API backend port
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #
    #     # WebSocket support (if needed)
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml;

    # Max body size (mainly for API proxy, if enabled)
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/yourapp-access.log;
    error_log /var/log/nginx/yourapp-error.log;
}

# HTTPS configuration (will be added by Certbot)
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name yourdomain.com www.yourdomain.com;
#
