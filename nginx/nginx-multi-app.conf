# ============================================
# Nginx Multi-App Configuration
# ============================================
# Host multiple applications on a single VPS using subdomains
# Each app runs on a different port, Nginx routes by domain
#
# Example setup:
#   - example.com         → React frontend (static files)
#   - api.example.com     → Node.js/NestJS API (port 3000)
#   - admin.example.com   → Laravel admin panel (PHP-FPM)
#   - staging.example.com → Staging environment (port 3001)
#
# Usage:
#   1. Copy each server block to a separate file:
#        /etc/nginx/sites-available/frontend
#        /etc/nginx/sites-available/api
#        /etc/nginx/sites-available/admin
#   2. Or keep all in one file for simplicity
#   3. Enable: sudo ln -s /etc/nginx/sites-available/FILE /etc/nginx/sites-enabled/
#   4. Test: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#   6. SSL (all subdomains at once):
#        sudo certbot --nginx -d example.com -d www.example.com \
#             -d api.example.com -d admin.example.com -d staging.example.com
#
# DNS Setup Required:
#   A     example.com         → YOUR_VPS_IP
#   A     api.example.com     → YOUR_VPS_IP
#   A     admin.example.com   → YOUR_VPS_IP
#   A     staging.example.com → YOUR_VPS_IP
#   (or use a wildcard: A *.example.com → YOUR_VPS_IP)
# ============================================

# ---- Include security headers in all sites ----
# include /etc/nginx/snippets/security-headers.conf;

# ============================================
# App 1: React Frontend (Static SPA)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/apps/frontend/build;   # React build output
    index index.html;

    access_log /var/log/nginx/frontend-access.log;
    error_log  /var/log/nginx/frontend-error.log;

    server_tokens off;

    # SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. { deny all; }
}

# ============================================
# App 2: Node.js/NestJS API
# ============================================
upstream api_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    access_log /var/log/nginx/api-access.log;
    error_log  /var/log/nginx/api-error.log;

    server_tokens off;
    client_max_body_size 50M;

    # ---- CORS headers (if frontend and API are on different subdomains) ----
    # Uncomment and adjust if your frontend calls this API cross-origin
    # add_header Access-Control-Allow-Origin "https://example.com" always;
    # add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    # add_header Access-Control-Allow-Credentials "true" always;
    #
    # # Handle preflight
    # if ($request_method = 'OPTIONS') {
    #     return 204;
    # }

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Rate limiting for API (optional)
    # Define in http block: limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://api_backend;
    #     ...
    # }

    location ~ /\. { deny all; }
}

# ============================================
# App 3: Laravel Admin Panel (PHP-FPM)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name admin.example.com;

    root /var/www/apps/admin/public;   # Laravel public directory
    index index.php;

    access_log /var/log/nginx/admin-access.log;
    error_log  /var/log/nginx/admin-error.log;

    server_tokens off;
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Block sensitive files
    location ~ /\.(?!well-known) { deny all; }
    location ~* /(vendor|storage|\.env|artisan) { deny all; }
}

# ============================================
# App 4: Staging Environment (separate port)
# ============================================
upstream staging_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name staging.example.com;

    access_log /var/log/nginx/staging-access.log;
    error_log  /var/log/nginx/staging-error.log;

    server_tokens off;

    # ---- Basic auth to protect staging ----
    # Create password file: sudo htpasswd -c /etc/nginx/.htpasswd staging_user
    # auth_basic "Staging Environment";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # ---- IP restriction (alternative to basic auth) ----
    # allow 203.0.113.0/24;   # Your office IP
    # allow 198.51.100.50;    # Your home IP
    # deny all;

    location / {
        proxy_pass http://staging_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\. { deny all; }
}

# ============================================
# Tips for Multi-App VPS
# ============================================
#
# 1. Resource Management:
#    - Monitor with: htop, pm2 monit
#    - Each Node app uses ~50-100MB RAM at idle
#    - PHP-FPM workers use ~30-50MB each
#    - Recommended: 4GB+ RAM for 3+ apps
#
# 2. PM2 Ecosystem (manage all Node apps):
#    module.exports = {
#      apps: [
#        { name: 'api',     script: 'dist/main.js', cwd: '/var/www/apps/api' },
#        { name: 'staging', script: 'dist/main.js', cwd: '/var/www/apps/staging', env: { PORT: 3001 } },
#      ]
#    };
#
# 3. Separate Log Files:
#    Each app has its own access/error log for easy debugging
#
# 4. SSL for all subdomains:
#    # Single command for all:
#    sudo certbot --nginx -d example.com -d *.example.com
#    # Or individual:
#    sudo certbot --nginx -d example.com -d www.example.com
#    sudo certbot --nginx -d api.example.com
#    sudo certbot --nginx -d admin.example.com
#
# 5. Firewall:
#    sudo ufw allow 80/tcp
#    sudo ufw allow 443/tcp
#    # Don't expose app ports (3000, 3001, etc.) — Nginx proxies them
#
# See also:
#   - docs/DOMAIN-DNS-GUIDE.md for DNS setup
#   - ssl/SSL-SETUP-GUIDE.md for SSL certificates
#   - docs/FIREWALL-SECURITY-GUIDE.md for firewall rules
# ============================================
