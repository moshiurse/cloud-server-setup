# ============================================
# Nginx Configuration for NestJS Application
# ============================================
# NestJS runs on port 3000 by default (same as Express under the hood)
# This config proxies requests to the NestJS process managed by PM2
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/your-app
#   2. Replace example.com with your domain
#   3. Replace port 3000 if your app uses a different port
#   4. Enable: sudo ln -s /etc/nginx/sites-available/your-app /etc/nginx/sites-enabled/
#   5. Test: sudo nginx -t
#   6. Reload: sudo systemctl reload nginx
#   7. SSL: sudo certbot --nginx -d example.com -d www.example.com
# ============================================

# ---- Include security headers (optional but recommended) ----
# include /etc/nginx/snippets/security-headers.conf;

upstream nestjs_upstream {
    # If running multiple instances behind PM2 cluster mode
    server 127.0.0.1:3000;
    # server 127.0.0.1:3001;  # Add more for manual load balancing
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # ---- Logging ----
    access_log /var/log/nginx/nestjs-access.log;
    error_log  /var/log/nginx/nestjs-error.log;

    # ---- Security ----
    # Hide Nginx version
    server_tokens off;

    # ---- Max upload size ----
    client_max_body_size 50M;

    # ---- Gzip compression ----
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ---- API routes → NestJS ----
    location / {
        proxy_pass http://nestjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---- Swagger/OpenAPI docs (if enabled) ----
    # NestJS Swagger is typically served at /api or /docs
    location /api {
        proxy_pass http://nestjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket support (e.g., @nestjs/websockets, Socket.IO gateway) ----
    location /socket.io/ {
        proxy_pass http://nestjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (keep connection alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Health check endpoint ----
    location /health {
        proxy_pass http://nestjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- Static file serving (if NestJS serves static assets) ----
    # Uncomment if using @nestjs/serve-static
    # location /public/ {
    #     alias /var/www/apps/nestjs-app/public/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ---- HTTPS (auto-configured by Certbot) ----
# After running: sudo certbot --nginx -d example.com -d www.example.com
# Certbot will add the SSL server block automatically.
#
# For manual HTTPS config, see ssl/SSL-SETUP-GUIDE.md
