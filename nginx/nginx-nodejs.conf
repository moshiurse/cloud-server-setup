# Nginx configuration for Node.js application (Express, Fastify, Koa, etc.)
# =========================================================================
#
# This configuration acts as a reverse proxy for a Node.js app
# running on a specific port (default: 3000).
#
# Prerequisites:
#   - Node.js installed
#   - PM2 installed globally (npm install -g pm2)
#   - Your Node.js app running via PM2
#
# Setup Steps:
#   1. Start your Node.js app with PM2:
#      cd /var/www/apps/yourapp
#      pm2 start app.js --name yourapp
#      pm2 save
#      pm2 startup    # Follow the instructions shown
#
#   2. Copy this file:
#      sudo cp nginx-nodejs.conf /etc/nginx/sites-available/yourapp
#
#   3. Edit the file and replace:
#      - "yourdomain.com" with your actual domain
#      - Port "3000" with the port your app runs on
#
#   4. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/yourapp /etc/nginx/sites-enabled/
#
#   5. Test configuration:
#      sudo nginx -t
#
#   6. Reload Nginx:
#      sudo systemctl reload nginx
#
#   7. Setup SSL (after DNS is pointed):
#      sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# PM2 Ecosystem File (ecosystem.config.js):
#   module.exports = {
#     apps: [{
#       name: 'yourapp',
#       script: 'app.js',              // or 'server.js', 'index.js'
#       cwd: '/var/www/apps/yourapp',
#       instances: 'max',              // use all CPU cores (cluster mode)
#       exec_mode: 'cluster',
#       env: {
#         NODE_ENV: 'production',
#         PORT: 3000
#       },
#       error_file: './logs/err.log',
#       out_file: './logs/out.log',
#       time: true
#     }]
#   }
#
# =========================================================================

# Upstream block for load balancing (useful with PM2 cluster mode)
upstream nodejs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS (enable after SSL is setup)
    # return 301 https://$server_name$request_uri;

    # Proxy all requests to Node.js app
    location / {
        proxy_pass http://nodejs_app;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't cache WebSocket connections
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve static files directly (if your app has a public directory)
    # Uncomment and adjust the path if applicable:
    # location /public/ {
    #     alias /var/www/apps/yourapp/public/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    # }

    # API-specific settings (optional - adjust rate limiting as needed)
    # location /api/ {
    #     proxy_pass http://nodejs_app;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #
    #     # Rate limiting (define limit_req_zone in nginx.conf http block)
    #     # limit_req zone=api burst=20 nodelay;
    # }

    # Health check endpoint (bypass logging)
    location /health {
        proxy_pass http://nodejs_app;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Max upload size
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/yourapp-access.log;
    error_log /var/log/nginx/yourapp-error.log;
}

# HTTPS configuration (will be added by Certbot)
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name yourdomain.com www.yourdomain.com;
#
