# ============================================
# Nginx Configuration for WebSocket Applications
# ============================================
# For apps using Socket.IO, ws, or native WebSocket
# Works with: Node.js, Next.js, NestJS, or any WebSocket server
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/your-app
#   2. Replace example.com with your domain
#   3. Replace port 3000 with your WebSocket server port
#   4. Enable: sudo ln -s /etc/nginx/sites-available/your-app /etc/nginx/sites-enabled/
#   5. Test: sudo nginx -t
#   6. Reload: sudo systemctl reload nginx
#   7. SSL: sudo certbot --nginx -d example.com
#
# Note: WebSockets REQUIRE the Upgrade and Connection headers.
#       Without them, connections fall back to HTTP long-polling.
# ============================================

# ---- Connection upgrade map ----
# Maps the Upgrade header to decide the Connection value
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream websocket_backend {
    # Your WebSocket server
    server 127.0.0.1:3000;

    # ---- For multiple instances (sticky sessions required) ----
    # Socket.IO with multiple servers needs sticky sessions
    # Option 1: IP hash (simple, works for most cases)
    # ip_hash;
    # server 127.0.0.1:3000;
    # server 127.0.0.1:3001;
    # server 127.0.0.1:3002;

    # Option 2: Use Redis adapter in your app instead (recommended)
    # Then any instance can handle any connection
    # npm install @socket.io/redis-adapter

    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # ---- Logging ----
    access_log /var/log/nginx/websocket-access.log;
    error_log  /var/log/nginx/websocket-error.log;

    server_tokens off;

    # ---- Regular HTTP/API routes ----
    location / {
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Socket.IO ----
    # Socket.IO uses /socket.io/ path by default
    location /socket.io/ {
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;

        # ⚠️ CRITICAL: These two headers enable the WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived — increase timeouts
        proxy_read_timeout    86400s;   # 24 hours
        proxy_send_timeout    86400s;
        proxy_connect_timeout 60s;

        # Disable buffering for real-time data
        proxy_buffering off;
        proxy_cache off;
    }

    # ---- Native WebSocket (ws:// or wss://) ----
    # For apps using the 'ws' npm package or native WebSocket API
    # Adjust the path to match your app's WebSocket endpoint
    location /ws {
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }

    # ---- GraphQL Subscriptions (WebSocket) ----
    # For Apollo Server, Hasura, or other GraphQL with subscriptions
    # location /graphql {
    #     proxy_pass http://websocket_backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 86400s;
    #     proxy_send_timeout 86400s;
    #     proxy_buffering off;
    # }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================
# Client-Side Connection Examples
# ============================================
#
# Socket.IO (JavaScript):
#   const socket = io('https://example.com', {
#     transports: ['websocket'],   // Skip long-polling, go straight to WS
#     // transports: ['polling', 'websocket'],  // Fallback mode (default)
#   });
#
# Native WebSocket:
#   const ws = new WebSocket('wss://example.com/ws');
#   ws.onmessage = (event) => console.log(event.data);
#
# NestJS Gateway (@nestjs/websockets):
#   @WebSocketGateway({ namespace: '/events', cors: true })
#   // Nginx proxies /socket.io/ to the NestJS gateway automatically
#
# Troubleshooting:
#   - "WebSocket is closed before the connection is established"
#     → Missing Upgrade/Connection headers in Nginx
#   - "400 Bad Request" on /socket.io/
#     → Nginx not proxying the path correctly
#   - Connection drops after 60 seconds
#     → Increase proxy_read_timeout (default is 60s)
#   - Multiple instances not sharing sessions
#     → Use Redis adapter: @socket.io/redis-adapter
# ============================================
