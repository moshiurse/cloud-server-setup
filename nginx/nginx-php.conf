# Nginx configuration for Raw PHP application
# =============================================
#
# This configuration serves a raw PHP project using PHP-FPM.
# It handles .php files via FastCGI and serves static assets directly.
#
# Prerequisites:
#   - PHP-FPM installed (e.g., php8.2-fpm)
#   - Nginx installed
#
# Setup Steps:
#   1. Copy this file:
#      sudo cp nginx-php.conf /etc/nginx/sites-available/yourapp
#
#   2. Edit the file and replace:
#      - "yourdomain.com" with your actual domain
#      - "/var/www/apps/yourapp/public" with your project's document root
#      - "php8.2-fpm" with your installed PHP-FPM version
#
#   3. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/yourapp /etc/nginx/sites-enabled/
#
#   4. Test configuration:
#      sudo nginx -t
#
#   5. Reload Nginx:
#      sudo systemctl reload nginx
#
#   6. Setup SSL (after DNS is pointed):
#      sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Directory Structure (recommended):
#   /var/www/apps/yourapp/
#   ├── public/          ← Document root (index.php goes here)
#   │   ├── index.php
#   │   ├── css/
#   │   ├── js/
#   │   └── images/
#   ├── src/             ← Application logic (not publicly accessible)
#   ├── config/
#   └── .env
#
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Document root - point to your public directory
    root /var/www/apps/yourapp/public;
    index index.php index.html index.htm;

    # Redirect HTTP to HTTPS (enable after SSL is setup)
    # return 301 https://$server_name$request_uri;

    # Handle requests - try files first, then directories, then pass to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        # Prevent execution of PHP files in upload directories
        # Uncomment and adjust if you have an uploads folder:
        # location ~ ^/uploads/.*\.php$ { deny all; }

        include snippets/fastcgi-params.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_index index.php;

        # Timeout settings for long-running scripts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;

        # Buffer settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to hidden files (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|sql|bak|config|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static file caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml;

    # Max upload size (adjust based on your application needs)
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/yourapp-access.log;
    error_log /var/log/nginx/yourapp-error.log;
}

