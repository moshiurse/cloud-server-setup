# ============================================
# Nginx Security Headers Snippet
# ============================================
# Reusable security headers for all sites.
#
# Installation:
#   1. Copy to /etc/nginx/snippets/security-headers.conf
#   2. Include in any server block:
#        include /etc/nginx/snippets/security-headers.conf;
#   3. Test: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#
# Test your headers: https://securityheaders.com
# ============================================

# ---- Clickjacking protection ----
# Prevents your site from being embedded in iframes on other domains
add_header X-Frame-Options "SAMEORIGIN" always;

# ---- MIME type sniffing protection ----
# Prevents browsers from interpreting files as a different MIME type
add_header X-Content-Type-Options "nosniff" always;

# ---- XSS protection ----
# Legacy header, still useful for older browsers
add_header X-XSS-Protection "1; mode=block" always;

# ---- Referrer Policy ----
# Controls how much referrer info is sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---- Permissions Policy (replaces Feature-Policy) ----
# Restrict browser features your site can use
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# ---- HSTS (HTTP Strict Transport Security) ----
# Forces HTTPS for 1 year + includes subdomains
# ⚠️ Only enable AFTER SSL is working! Uncommenting this without SSL will lock users out.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ---- Content Security Policy ----
# Controls which resources the browser can load
# ⚠️ CUSTOMIZE THIS for your app — overly strict CSP breaks functionality
#
# Starter policy (permissive — tighten for production):
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https:; frame-ancestors 'self';" always;
#
# Strict policy (recommended for APIs):
# add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

# ---- Cross-Origin Policies ----
# Isolate your site from other origins (helps prevent Spectre-type attacks)
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# add_header Cross-Origin-Embedder-Policy "require-corp" always;  # ⚠️ May break third-party resources

# ---- Hide server info ----
# Hides Nginx version (also add server_tokens off; in the server block)
more_clear_headers Server;
# Note: more_clear_headers requires ngx_headers_more module
# Install: sudo apt install libnginx-mod-http-headers-more-filter

# ============================================
# Usage Examples
# ============================================
#
# Basic — include in any server block:
#   server {
#       listen 80;
#       server_name example.com;
#       include /etc/nginx/snippets/security-headers.conf;
#       ...
#   }
#
# With HSTS (only after SSL is confirmed working):
#   1. Uncomment the Strict-Transport-Security line above
#   2. Test with a short max-age first: max-age=300
#   3. Once confirmed, increase to max-age=31536000
#
# Per-site CSP override:
#   server {
#       include /etc/nginx/snippets/security-headers.conf;
#       # Override CSP for this specific site
#       add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.example.com;" always;
#   }
# ============================================
