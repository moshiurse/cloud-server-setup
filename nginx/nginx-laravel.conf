# Nginx configuration for Laravel application
# =============================================
#
# This configuration serves a Laravel app using PHP-FPM.
# Laravel's front controller (public/index.php) handles all routing.
#
# Prerequisites:
#   - PHP-FPM installed (e.g., php8.2-fpm)
#   - Composer dependencies installed
#   - Laravel storage linked: php artisan storage:link
#
# Setup Steps:
#   1. Copy this file:
#      sudo cp nginx-laravel.conf /etc/nginx/sites-available/yourapp
#
#   2. Edit the file and replace:
#      - "yourdomain.com" with your actual domain
#      - "/var/www/apps/yourapp" with your project path
#      - "php8.2-fpm" with your installed PHP-FPM version
#
#   3. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/yourapp /etc/nginx/sites-enabled/
#
#   4. Test & reload:
#      sudo nginx -t && sudo systemctl reload nginx
#
#   5. Setup SSL:
#      sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Directory Structure:
#   /var/www/apps/yourapp/
#   ├── app/
#   ├── bootstrap/cache/     ← Must be writable by www-data
#   ├── config/
#   ├── database/
#   ├── public/              ← Document root (Nginx points here)
#   │   ├── index.php        ← Laravel front controller
#   │   ├── storage → ../storage/app/public  (symlink)
#   │   ├── css/
#   │   └── js/
#   ├── resources/
#   ├── routes/
#   ├── storage/             ← Must be writable by www-data
#   │   ├── app/
#   │   ├── framework/
#   │   └── logs/
#   └── .env
#
# Permissions (run once after deployment):
#   sudo chown -R www-data:www-data storage bootstrap/cache
#   sudo chmod -R 775 storage bootstrap/cache
#
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Document root — must point to Laravel's public/ directory
    root /var/www/apps/yourapp/public;
    index index.php;

    # Redirect HTTP to HTTPS (enable after SSL is setup)
    # return 301 https://$server_name$request_uri;

    # Character encoding
    charset utf-8;

    # Laravel routing — send everything through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_index index.php;

        # Timeout for long-running requests (queues, imports, etc.)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 120s;
        fastcgi_read_timeout 120s;

        # Buffer settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Serve Laravel storage files (public disk)
    location /storage/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Serve static assets with caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Laravel mix / Vite build assets (hashed filenames — cache forever)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to sensitive Laravel files
    location ~* \.(env|log|sql|bak)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to Composer files
    location ~ composer\.(json|lock)$ {
        deny all;
    }

    # Disable favicon.ico logging
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Disable robots.txt logging
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml;

    # Max upload size (adjust for file uploads in your app)
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/yourapp-access.log;
    error_log /var/log/nginx/yourapp-error.log;
}

