# ============================================================
# Docker Compose — React.js (Static SPA)
# ============================================================
# Usage:
#   cp docker-compose.reactjs.yml /var/www/apps/yourapp/docker-compose.yml
#   cd /var/www/apps/yourapp
#   docker compose up -d
#
# React builds into static files — Nginx serves them directly.
# No Node.js process is needed at runtime.
# ============================================================

services:
  # ── React App (Nginx serves the build output) ──────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Pass build-time env vars:
      # args:
      #   REACT_APP_API_URL: https://api.yourdomain.com
      #   VITE_API_URL: https://api.yourdomain.com
    container_name: myapp-react
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    # Override Nginx config if needed:
    # volumes:
    #   - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    #   - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API Backend (Uncomment if running backend on same VPS)
  # api:
  #   build:
  #     context: ../backend
  #     dockerfile: Dockerfile
  #   container_name: myapp-api
  #   restart: unless-stopped
  #   env_file:
  #     - ../backend/.env
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

networks:
  app-network:
    driver: bridge
