# ============================================================
# Docker Compose — Laravel + Nginx + MySQL + Redis + Queue
# ============================================================
# Usage:
#   cp docker-compose.laravel.yml /var/www/apps/yourapp/docker-compose.yml
#   cd /var/www/apps/yourapp
#   cp .env.example .env
#   docker compose up -d
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate
# ============================================================

services:
  # ── Laravel PHP-FPM Application ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp-laravel
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage     # Persist storage
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-myapp_db}
      DB_USERNAME: ${DB_USERNAME:-myapp_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

  # ── Nginx Web Server ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    depends_on:
      - app

  # ── MySQL Database ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myapp-mysql
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-myapp_db}
      MYSQL_USER: ${DB_USERNAME:-myapp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myapp-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel Queue Worker ────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      - app
      - redis

  # ── Laravel Scheduler (Cron) ────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php /var/www/html/artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      - app

  # ── Mailpit (Dev only — local mail testing) ─────────────
  # mailpit:
  #   image: axllent/mailpit
  #   container_name: myapp-mailpit
  #   restart: unless-stopped
  #   ports:
  #     - "8025:8025"      # Web UI
  #     - "1025:1025"      # SMTP
  #   networks:
  #     - app-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
