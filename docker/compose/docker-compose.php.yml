# ============================================================
# Docker Compose — Raw PHP + Nginx + MySQL
# ============================================================
# Usage:
#   cp docker-compose.php.yml /var/www/apps/yourapp/docker-compose.yml
#   cd /var/www/apps/yourapp
#   docker compose up -d
# ============================================================

services:
  # ── PHP-FPM Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Or use the template:
      # dockerfile: docker/dockerfiles/Dockerfile.php
    container_name: myapp-php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-myapp_db}
      DB_USERNAME: ${DB_USERNAME:-myapp_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

  # ── Nginx Web Server ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL (uncomment after setting up certificates):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    depends_on:
      - app

  # ── MySQL Database ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myapp-mysql
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"   # 3307 externally to avoid conflicts
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-myapp_db}
      MYSQL_USER: ${DB_USERNAME:-myapp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # SQL files run on first start
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── phpMyAdmin (Optional — remove in production) ────────
  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   container_name: myapp-phpmyadmin
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"
  #   environment:
  #     PMA_HOST: mysql
  #     PMA_PORT: 3306
  #   networks:
  #     - app-network
  #   depends_on:
  #     - mysql

  # ── Redis Cache (Optional) ─────────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: myapp-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network

volumes:
  mysql-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  app-network:
    driver: bridge
