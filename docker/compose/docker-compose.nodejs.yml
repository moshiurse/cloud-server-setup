# ============================================================
# Docker Compose — Node.js + Nginx + Database
# ============================================================
# Usage:
#   cp docker-compose.nodejs.yml /var/www/apps/yourapp/docker-compose.yml
#   cd /var/www/apps/yourapp
#   docker compose up -d
# ============================================================

services:
  # ── Node.js Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp-node
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql             # Use 'postgres' if using PostgreSQL
      REDIS_HOST: redis
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    depends_on:
      - app

  # ── MySQL ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: myapp-mysql
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-myapp_db}
      MYSQL_USER: ${DB_USERNAME:-myapp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Alternative — uncomment and remove MySQL)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: myapp-postgres
  #   restart: unless-stopped
  #   ports:
  #     - "${DB_EXTERNAL_PORT:-5433}:5432"
  #   environment:
  #     POSTGRES_DB: ${DB_DATABASE:-myapp_db}
  #     POSTGRES_USER: ${DB_USERNAME:-myapp_user}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-myapp_user}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Redis (Optional) ───────────────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: myapp-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network

volumes:
  mysql-data:
    driver: local
  # postgres-data:
  #   driver: local
  # redis-data:
  #   driver: local

networks:
  app-network:
    driver: bridge
