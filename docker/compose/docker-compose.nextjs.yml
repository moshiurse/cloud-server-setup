# ============================================================
# Docker Compose — Next.js + Nginx
# ============================================================
# Usage:
#   cp docker-compose.nextjs.yml /var/www/apps/yourapp/docker-compose.yml
#   cd /var/www/apps/yourapp
#   docker compose up -d
#
# Note: Next.js is a self-contained server. Nginx acts as a
# reverse proxy for SSL termination and static file caching.
# ============================================================

services:
  # ── Next.js Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Pass build-time env vars (NEXT_PUBLIC_* only):
      # args:
      #   NEXT_PUBLIC_API_URL: https://api.yourdomain.com
    container_name: myapp-next
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    # Uncomment if Next.js needs database access:
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: myapp-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy

  # ── PostgreSQL (Uncomment if needed) ────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: myapp-postgres
  #   restart: unless-stopped
  #   ports:
  #     - "5433:5432"
  #   environment:
  #     POSTGRES_DB: ${DB_DATABASE:-myapp_db}
  #     POSTGRES_USER: ${DB_USERNAME:-myapp_user}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-myapp_user}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Redis (Uncomment if needed) ─────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: myapp-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network

volumes: {}
  # postgres-data:
  #   driver: local
  # redis-data:
  #   driver: local

networks:
  app-network:
    driver: bridge
