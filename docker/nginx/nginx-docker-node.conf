# Nginx config for Docker — Node.js / Next.js / NestJS container
# Use as: docker/nginx/default.conf (mounted into Nginx container)
# Key difference: proxy_pass uses container name "app" instead of localhost

upstream node_app {
    server app:3000;                            # "app" = Node.js container name
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://node_app;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets (if applicable)
    location /_next/static/ {
        proxy_pass http://node_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # Health check (bypass logging)
    location /health {
        proxy_pass http://node_app;
        access_log off;
    }

    location ~ /\. { deny all; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    client_max_body_size 10M;
}
