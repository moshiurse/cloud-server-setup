# Nginx config for Docker — Laravel container
# Use as: docker/nginx/default.conf (mounted into Nginx container)
# Same as PHP but with Laravel-specific paths and caching

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;                  # "app" = Laravel container name
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_read_timeout 120s;
    }

    # Laravel storage files
    location /storage/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Laravel Vite build assets
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security
    location ~ /\. { deny all; }
    location ~* \.(env|log|sql|bak)$ { deny all; }
    location ~ composer\.(json|lock)$ { deny all; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    client_max_body_size 50M;
}
